<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive website</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>
    <nav>
        <a href="#">bubbles</a>
        <a href="#">flowers</a>
        <a href="#">sky</a>
    </nav>
    <h1>My responsive website</h1>
    <img src="image.jpg" alt="Flower">
    <video controls>
        <source src="video.mp4" type="video/mp4">
    </video>
    <table>
            <tr>
                <th>1</th>
                <th>2</th>
                <th>3</th>
        </tr>
        <tr>
            <td>apple</td>
            <td>ball</td>
            <td>cat</td>
        </tr>
        <tr>
            <td>dog</td>
            <td>egg</td>
            <td>fire</td>
        </tr>
    </table>
    <button>Click Me</button>
    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>
    
</body>
</html>
